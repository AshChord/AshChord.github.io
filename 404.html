<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="/assets/favicon.svg" type="image/x-icon">
  <title>AshChord.log</title>

  <!-- Marked -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.12/marked.min.js"></script>

  <!-- Highlight -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">

  <!-- Style -->
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/markdown.css">
</head>

<body>
  <script>
    (async () => {
      const html = await fetch("/", { cache: "no-store" }).then(res => res.text());
      const doc = new DOMParser().parseFromString(html, "text/html");

      const scrList = [...doc.querySelectorAll("script")]
        .map(scr => scr.getAttribute('src'))
        .filter(src => src && src.startsWith('/js'));

      doc.querySelectorAll("script").forEach(scr => scr.remove());

      document.body.replaceChildren(...doc.body.childNodes);

      scrList.forEach(src => {
        const scr = document.createElement("script");
        scr.src = src;
        scr.async = false;
        document.body.appendChild(scr);
      });
    })();
  </script>
</body>

</html>
