<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <title>AshChord.log</title>

  <link rel="stylesheet" href="/assets/css/style.css">

<body>
  <header>
    <!-- Blog Title -->
    <a href="/" class="blog-title">AshChord.log</a>

    <!-- Menu -->
    <menu>
      <li class="menu-item"><a href="/home">Home</a></li>
      <li class="menu-item"><a href="/posts">Posts</a></li>
      <li class="menu-item"><a href="/about">About</a></li>
    </menu>

    <!-- Search -->
    <search>
      <form class="search-bar" action="/posts" method="get">
        <input type="text" name="keyword" class="search-input" placeholder="Keyword">
        <button type="reset" class="search-reset-button"></button>
        <button type="submit" class="search-submit-button"></button>
      </form>
    </search>
  </header>

  <main>
    <!-- Feed -->
    <section class="feed">
      <template class="feed-template">
        <article class="feed-item">
          <a href class="preview">
            <img src alt class="thumbnail">
            <h2 class="title"></h2>
            <p class="excerpt"></p>
            <p class="date"></p>
          </a>
          <nav class="category-list">
            <template class="category-template">
              <a href class="category"></a>
            </template>
          </nav>
        </article>
      </template>
    </section>

    <!-- Content -->
    <article class="content">
      <header class="content-header">
        <div class="category-list"></div>
        <h1 class="title"></h1>
        <p class="date"></p>
        <img src alt class="thumbnail">
      </header>
      <section class="content-body"></section>
    </article>

    <!-- Outline -->
    <aside class="outline">
      <nav class="heading-list"></nav>
    </aside>

    <!-- Pagination -->
    <nav class="pagination">
      <a href class="page-first"></a>
      <a href class="page-previous"></a>
      <a href class="page-next"></a>
      <a href class="page-last"></a>
    </nav>

    <!-- Category Panel -->
    <details class="category-panel">
      <summary class="category-panel-button"></summary>
      <h2 class="category-panel-title">CATEGORIES</h2>
      <ul class="category-menu"></ul>
    </details>
  </main>

</body>

</html>
